# AI测试管理平台 - 启动后端服务(跳过已有基础设施)
# 使用：docker compose -f deploy/docker-compose.backend-only.yml up -d

services:
  ##########################
  # 微服务 (跳过MySQL/Redis/RabbitMQ)
  ##########################

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    container_name: ai-test-auth-service
    restart: always
    ports:
      - "8001:8001"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://10.255.255.254:3306/ai_test_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: 10.255.255.254
      SPRING_REDIS_PORT: 6379
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: "false"
    networks:
      - ai-test-network

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    container_name: ai-test-user-service
    restart: always
    ports:
      - "8002:8002"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://10.255.255.254:3306/ai_test_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: 10.255.255.254
      SPRING_REDIS_PORT: 6379
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: "false"
    networks:
      - ai-test-network

  project-service:
    build:
      context: ..
      dockerfile: services/project-service/Dockerfile
    container_name: ai-test-project-service
    restart: always
    ports:
      - "8003:8003"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://10.255.255.254:3306/ai_test_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: 10.255.255.254
      SPRING_REDIS_PORT: 6379
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: "false"
    networks:
      - ai-test-network

  testcase-service:
    build:
      context: ..
      dockerfile: services/testcase-service/Dockerfile
    container_name: ai-test-testcase-service
    restart: always
    ports:
      - "8004:8004"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://10.255.255.254:3306/ai_test_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: 10.255.255.254
      SPRING_REDIS_PORT: 6379
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: "false"
    networks:
      - ai-test-network

  defect-service:
    build:
      context: ..
      dockerfile: services/defect-service/Dockerfile
    container_name: ai-test-defect-service
    restart: always
    ports:
      - "8005:8005"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://10.255.255.254:3306/ai_test_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: 10.255.255.254
      SPRING_REDIS_PORT: 6379
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: "false"
    networks:
      - ai-test-network

  requirement-service:
    build:
      context: ..
      dockerfile: services/requirement-service/Dockerfile
    container_name: ai-test-requirement-service
    restart: always
    ports:
      - "8006:8006"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://10.255.255.254:3306/ai_test_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: 10.255.255.254
      SPRING_REDIS_PORT: 6379
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: "false"
      SERVER_PORT: 8006
    networks:
      - ai-test-network

  dashboard-service:
    build:
      context: ..
      dockerfile: services/dashboard-service/Dockerfile
    container_name: ai-test-dashboard-service
    restart: always
    ports:
      - "8007:8007"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: "false"
    networks:
      - ai-test-network

  strategy-service:
    build:
      context: ..
      dockerfile: services/strategy-service/Dockerfile
    container_name: ai-test-strategy-service
    restart: always
    ports:
      - "8008:8008"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://10.255.255.254:3306/ai_test_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: "false"
    networks:
      - ai-test-network

  ai-service:
    build:
      context: ..
      dockerfile: services/ai-service/Dockerfile
    container_name: ai-test-ai-service
    restart: always
    ports:
      - "8010:8010"
    networks:
      - ai-test-network

  ##########################
  # 前端
  ##########################

  frontend:
    build:
      context: ..
      dockerfile: services/frontend/Dockerfile
    container_name: ai-test-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - user-service
      - project-service
      - testcase-service
      - defect-service
      - requirement-service
      - dashboard-service
      - strategy-service
      - ai-service
    networks:
      - ai-test-network

networks:
  ai-test-network:
    driver: bridge
    name: ai-test-network