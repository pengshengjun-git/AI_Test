user nginx;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        location /api/v1/auth/ {
            set $auth_service auth-service:9001;
            proxy_pass http://$auth_service/api/v1/auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /api/v1/user/info {
            set $user_service user-service:9002;
            proxy_pass http://$user_service/api/v1/users/me;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/users/ {
            set $user_service user-service:9002;
            proxy_pass http://$user_service/api/v1/users;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/roles/ {
            set $user_service user-service:9002;
            proxy_pass http://$user_service/api/v1/roles;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/permissions/ {
            set $user_service user-service:9002;
            proxy_pass http://$user_service/api/v1/permissions;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/menus {
            set $user_service user-service:9002;
            proxy_pass http://$user_service/api/menus;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~* ^/api/v1/projects(/.*)?$ {
            set $project_service project-service:9003;
            proxy_pass http://$project_service/api/v1/projects$1$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~* ^/api/v1/testcases(/.*)?$ {
            set $testcase_service testcase-service:9005;
            proxy_pass http://$testcase_service/api/v1/testcases$1$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~* ^/api/v1/defects(/.*)?$ {
            set $defect_service defect-service:9006;
            proxy_pass http://$defect_service/api/v1/defects$1$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~* ^/api/v1/requirements(/.*)?$ {
            set $requirement_service requirement-service:9004;
            proxy_pass http://$requirement_service/api/v1/requirements$1$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~* ^/api/v1/testplans(/.*)?$ {
            set $dashboard_service dashboard-service:9007;
            proxy_pass http://$dashboard_service/api/v1/testplans$1$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/dashboard/ {
            proxy_pass http://dashboard-service:9007/api/v1/dashboard/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/strategy {
            set $strategy_service strategy-service:9008;
            proxy_pass http://$strategy_service/api/v1/strategy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/ai/ {
            set $ai_service ai-service:9010;
            proxy_pass http://$ai_service/api/v1/ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/coverage {
            set $dashboard_service dashboard-service:9007;
            proxy_pass http://$dashboard_service/api/v1/coverage;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
