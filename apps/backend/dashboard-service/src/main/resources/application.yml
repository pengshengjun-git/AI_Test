server:
  port: 8007
  servlet:
    encoding:
      enabled: true
      charset: UTF-8
      force: true

spring:
  application:
    name: dashboard-service
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    nacos:
      discovery:
        enabled: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    charset: UTF-8

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
